name: Cypress E2E + Allure Report (Clean & Isolated)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ════════════════════════════════════════
  # SUITE 1 — Getting Started
  # ════════════════════════════════════════
  getting-started:
    name: "Suite — Getting Started"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 🔥 CLAVE: carpeta única por job
      - name: Set Allure results directory
        run: |
          mkdir -p allure-results-getting-started
          echo "ALLURE_RESULTS_DIR=allure-results-getting-started" >> $GITHUB_ENV

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/1-getting-started/**/*.cy.js
          install: false
        continue-on-error: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-getting-started
          path: allure-results-getting-started
          if-no-files-found: warn

  # ════════════════════════════════════════
  # SUITE 2 — Advanced Examples
  # ════════════════════════════════════════
  advanced-examples:
    name: "Suite — Advanced Examples"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Set Allure results directory
        run: |
          mkdir -p allure-results-advanced
          echo "ALLURE_RESULTS_DIR=allure-results-advanced" >> $GITHUB_ENV

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/2-advanced-examples/**/*.cy.js
          install: false
        continue-on-error: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-advanced
          path: allure-results-advanced

  # ════════════════════════════════════════
  # SUITE 3 — FreeRange + POM
  # ════════════════════════════════════════
  freerange-pom:
    name: "Suite — FreeRange + POM"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Set Allure results directory
        run: |
          mkdir -p allure-results-freerange
          echo "ALLURE_RESULTS_DIR=allure-results-freerange" >> $GITHUB_ENV

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: |
            cypress/e2e/3-freeRangeTest/**/*.cy.js
            cypress/e2e/PageObjetModel/**/*.cy.js
          install: false
        continue-on-error: true
        env:
          CYPRESS_defaultCommandTimeout: "10000"

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-freerange
          path: allure-results-freerange

  # ════════════════════════════════════════
  # SUITE 4 — API Tests
  # ════════════════════════════════════════
  api-tests:
    name: "Suite — API Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Set Allure results directory
        run: |
          mkdir -p allure-results-api
          echo "ALLURE_RESULTS_DIR=allure-results-api" >> $GITHUB_ENV

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/Apis-Test/**/*.cy.js
          install: false
        continue-on-error: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-api
          path: allure-results-api

  # ════════════════════════════════════════
  # REPORT — Allure limpio y correcto
  # ════════════════════════════════════════
  allure-report:
    name: "Generate & Deploy Allure Report"
    runs-on: ubuntu-latest
    needs: [getting-started, advanced-examples, freerange-pom, api-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      # 🔥 Descargar SIN merge automático
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw-results

      # 🔥 Merge manual controlado (CLAVE REAL)
      - name: Merge results safely
        run: |
          rm -rf allure-results
          mkdir allure-results

          for dir in raw-results/*; do
            echo "Merging $dir"
            cp -r $dir/* allure-results/ 2>/dev/null || true
          done

          echo "Archivos finales:"
          find allure-results -type f | head -20

      # 🔥 Evitar residuos internos
      - name: Remove history (clean execution)
        run: rm -rf allure-results/history || true

      # Instalar Allure
      - name: Install Allure CLI
        run: |
          curl -sLo allure.tgz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      # Generar reporte limpio
      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report

      # Deploy limpio
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          force_orphan: true

      # Resumen
      - name: Pipeline summary
        if: always()
        run: |
          echo "## ✅ Cypress E2E — Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Getting Started   | ${{ needs.getting-started.result   == 'success' && '✅ Pasó' || '⚠️ Ver reporte' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Advanced Examples | ${{ needs.advanced-examples.result == 'success' && '✅ Pasó' || '⚠️ Ver reporte' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| FreeRange + POM   | ${{ needs.freerange-pom.result     == 'success' && '✅ Pasó' || '⚠️ Ver reporte' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests         | ${{ needs.api-tests.result         == 'success' && '✅ Pasó' || '⚠️ Ver reporte' }} |" >> $GITHUB_STEP_SUMMARY
