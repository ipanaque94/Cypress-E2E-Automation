name: Cypress E2E + Allure Report

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # SUITE JOBS
  # ──────────────────────────────────────────────────────────────────────────

  getting-started:
    name: "Suite — Getting Started"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean workspace
        run: rm -rf allure-results allure-report cypress/screenshots cypress/videos

      - name: Run Cypress — Getting Started
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/1-getting-started/**/*.cy.js
          install: false
        continue-on-error: true

      # Subir SOLO los archivos de resultado de esta suite (sin carpeta history)
      - name: Upload allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-getting-started
          path: allure-results/
          if-no-files-found: warn
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-getting-started
          path: cypress/screenshots/
          retention-days: 7

  advanced-examples:
    name: "Suite — Advanced Examples"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean workspace
        run: rm -rf allure-results allure-report cypress/screenshots cypress/videos

      - name: Run Cypress — Advanced Examples
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/2-advanced-examples/**/*.cy.js
          install: false
        continue-on-error: true

      - name: Upload allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-advanced
          path: allure-results/
          if-no-files-found: warn
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-advanced
          path: cypress/screenshots/
          retention-days: 7

  freerange-pom:
    name: "Suite — FreeRange + POM"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean workspace
        run: rm -rf allure-results allure-report cypress/screenshots cypress/videos

      - name: Run Cypress — FreeRange y POM
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: |
            cypress/e2e/3-freeRangeTest/**/*.cy.js
            cypress/e2e/PageObjetModel/**/*.cy.js
          install: false
        continue-on-error: true
        env:
          CYPRESS_defaultCommandTimeout: "10000"

      - name: Upload allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-freerange
          path: allure-results/
          if-no-files-found: warn
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-freerange
          path: cypress/screenshots/
          retention-days: 7

  api-tests:
    name: "Suite — API Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean workspace
        run: rm -rf allure-results allure-report cypress/screenshots cypress/videos

      - name: Run Cypress — API Tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/Apis-Test/**/*.cy.js
          install: false
        continue-on-error: true

      - name: Upload allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results/
          if-no-files-found: warn
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-api
          path: cypress/screenshots/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # REPORT JOB
  # ──────────────────────────────────────────────────────────────────────────

  allure-report:
    name: "Generar y publicar reporte Allure"
    runs-on: ubuntu-latest
    needs: [getting-started, advanced-examples, freerange-pom, api-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      # ── 1. Descargar resultados frescos de esta ejecución ─────────────────
      - name: Download all allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-raw
          merge-multiple: true

      # ── 2. Crear carpeta de resultados SOLO con los JSONs de esta run ─────
      #       Se excluye cualquier subcarpeta (history, attachments de runs
      #       anteriores) que pudiera haber quedado embebida en los artefactos
      - name: Build clean allure-results (current run only)
        run: |
          mkdir -p allure-results
          # Copiar únicamente los archivos en el primer nivel (los JSON/XML
          # generados por el reporter de Cypress-Allure de esta ejecución)
          find allure-results-raw -maxdepth 1 -type f \
            \( -name "*.json" -o -name "*.xml" -o -name "*.png" -o -name "*.mp4" \) \
            -exec cp {} allure-results/ \;
          echo "── Resultados limpios ──"
          ls -la allure-results/

      # ── 3. Instalar Allure CLI ─────────────────────────────────────────────
      - name: Install Allure CLI
        run: |
          curl -sLo allure.tgz \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      # ── 4. Restaurar historial de tendencia (desde artefacto, NO gh-pages) ─
      #       Usamos un artefacto dedicado "allure-history" que vive entre runs.
      #       La primera vez no existe → Allure arranca sin historial (correcto).
      - name: Restore Allure history from artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-history
          path: allure-results/history
        continue-on-error: true # primera ejecución: no existe aún, se ignora

      # ── 5. Generar reporte ─────────────────────────────────────────────────
      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report
          echo "── Report contents ──"
          ls -la allure-report/

      # ── 6. Guardar el historial generado como artefacto para el próximo run ─
      #       Este artefacto reemplaza al anterior (mismo nombre).
      - name: Save Allure history for next run
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-history
          path: allure-report/history/
          if-no-files-found: warn
          retention-days: 30 # conserva tendencia por 30 días

      # ── 7. Publicar en GitHub Pages ────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          force_orphan: true

      # ── 8. Resumen ─────────────────────────────────────────────────────────
      - name: Pipeline summary
        if: always()
        run: |
          echo "## ✅ Cypress E2E — Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Getting Started   | ${{ needs.getting-started.result   == 'success' && '✅ Pasó' || '❌ Ver reporte' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Advanced Examples | ${{ needs.advanced-examples.result == 'success' && '✅ Pasó' || '❌ Ver reporte' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| FreeRange + POM   | ${{ needs.freerange-pom.result     == 'success' && '✅ Pasó' || '❌ Ver reporte' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests         | ${{ needs.api-tests.result         == 'success' && '✅ Pasó' || '❌ Ver reporte' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Reporte Allure:** https://ipanaque94.github.io/Cypress-E2E-Automation/" >> $GITHUB_STEP_SUMMARY
