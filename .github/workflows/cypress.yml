name: Cypress E2E + Allure Report

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════
  #  SUITE 1 — Getting Started
  # ═══════════════════════════════════════════════════════════
  getting-started:
    name: "Suite — Getting Started"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean workspace
        run: rm -rf allure-results allure-report cypress/screenshots cypress/videos

      - name: Run Cypress — Getting Started
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/1-getting-started/**/*.cy.js
          install: false
        continue-on-error: true

      - name: Remove allure history before upload
        run: rm -rf allure-results/history || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-getting-started
          path: allure-results/
          if-no-files-found: warn
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-getting-started
          path: cypress/screenshots/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  #  SUITE 2 — Advanced Examples
  # ═══════════════════════════════════════════════════════════
  advanced-examples:
    name: "Suite — Advanced Examples"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean workspace
        run: rm -rf allure-results allure-report cypress/screenshots cypress/videos

      - name: Run Cypress — Advanced Examples
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/2-advanced-examples/**/*.cy.js
          install: false
        continue-on-error: true

      - name: Remove allure history before upload
        run: rm -rf allure-results/history || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-advanced
          path: allure-results/
          if-no-files-found: warn
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-advanced
          path: cypress/screenshots/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  #  SUITE 3 — FreeRange + POM
  # ═══════════════════════════════════════════════════════════
  freerange-pom:
    name: "Suite — FreeRange + POM"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean workspace
        run: rm -rf allure-results allure-report cypress/screenshots cypress/videos

      - name: Run Cypress — FreeRange y POM
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: |
            cypress/e2e/3-freeRangeTest/**/*.cy.js
            cypress/e2e/PageObjetModel/**/*.cy.js
          install: false
        continue-on-error: true
        env:
          CYPRESS_defaultCommandTimeout: "10000"

      - name: Remove allure history before upload
        run: rm -rf allure-results/history || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-freerange
          path: allure-results/
          if-no-files-found: warn
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-freerange
          path: cypress/screenshots/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  #  SUITE 4 — API Tests
  # ═══════════════════════════════════════════════════════════
  api-tests:
    name: "Suite — API Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean workspace
        run: rm -rf allure-results allure-report cypress/screenshots cypress/videos

      - name: Run Cypress — API Tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/Apis-Test/**/*.cy.js
          install: false
        continue-on-error: true

      - name: Remove allure history before upload
        run: rm -rf allure-results/history || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results/
          if-no-files-found: warn
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-api
          path: cypress/screenshots/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  #  REPORT — Genera y publica reporte Allure
  # ═══════════════════════════════════════════════════════════
  allure-report:
    name: "Generar y publicar reporte Allure"
    runs-on: ubuntu-latest
    needs: [getting-started, advanced-examples, freerange-pom, api-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      # ── 1. Descargar y fusionar todos los artefactos de resultados ───────
      - name: Download all allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      # ── 2. Eliminar TODA carpeta history que venga en los resultados ──────
      - name: Remove any stale history from results
        run: |
          find allure-results -type d -name "history" -exec rm -rf {} + 2>/dev/null || true
          echo "=== Contenido final de allure-results (primeras líneas) ==="
          find allure-results -maxdepth 4 -type f -print | sed -n '1,200p' || true

      # ── 3. Instalar Allure CLI ────────────────────────────────────────────
      - name: Install Allure CLI
        run: |
          curl -sLo allure.tgz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      # ── 4. Generar reporte 100% limpio ───────────────────────────────────
      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report
          echo "── Reporte generado ──"
          ls -la allure-report/ || true

      # ── 5. Publicar en GitHub Pages ───────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          force_orphan: true

      # ── 6. Resumen del pipeline ───────────────────────────────────────────
      - name: Pipeline summary
        if: always()
        run: |
          echo "## ✅ Cypress E2E — Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Getting Started   | ${{ needs.getting-started.result   == 'success' && '✅ Pasó' || '❌ Ver reporte' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Advanced Examples | ${{ needs.advanced-examples.result == 'success' && '✅ Pasó' || '❌ Ver reporte' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| FreeRange + POM   | ${{ needs.freerange-pom.result     == 'success' && '✅ Pasó' || '❌ Ver reporte' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests         | ${{ needs.api-tests.result         == 'success' && '✅ Pasó' || '❌ Ver reporte' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Reporte Allure:** https://ipanaque94.github.io/Cypress-E2E-Automation/" >> $GITHUB_STEP_SUMMARY
